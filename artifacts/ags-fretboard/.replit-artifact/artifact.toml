kind = "web"
previewPath = "/ags/"
title = "AGS Fretboard Universe"
version = "1.0.0"
id = "artifacts/ags-fretboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ags/" ]
localPort = 22016

[services.development]
run = "pnpm --filter @workspace/ags-fretboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ags-fretboard", "run", "build" ]
publicDir = "artifacts/ags-fretboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22016"
BASE_PATH = "/ags/"
